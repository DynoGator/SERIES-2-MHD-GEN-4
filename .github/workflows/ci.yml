name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # PyQt6 / pytest-qt need a headless platform + the GL/EGL shared libs.
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Qt headless system libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libegl1 libgl1 libglib2.0-0 libxkbcommon0 libdbus-1-3
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Pytest
      run: |
        export PYTHONPATH=.
        pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install linter
      run: pip install flake8
    - name: Run Flake8
      run: |
        flake8 core/ physics/ digital_twin/ hardware/ gui/ --count --select=E9,F63,F7,F82 --show-source --statistics

  build-deb:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build Mock Debian Package
      run: |
        chmod +x packaging/build_deb.sh
        # We just test the script execution
        ./packaging/build_deb.sh || true
